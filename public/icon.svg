<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Carnegie home-screen icon. Navy ground with the four-spine-stack
       glyph centered — a clean version of the brand mark that lives
       in the sidebar. Per spec: no tartan inside the icon, just the
       spine bars.

       Colors:
         navy   #1B3A5C   ground
         gold   #C4A35A   tallest spine
         blue   #5B8DB8
         red    #B83232
         gray   #8A8A84   shortest spine

       Geometry: 4 bars × 50px wide on a 16px gap (= 230px total),
       centered horizontally. Heights 290 / 250 / 210 / 170 px,
       vertically centered on the canvas. 25% rounded corners
       (rx=128) match the sidebar tile and the maskable safe zone. -->
  <defs>
    <clipPath id="carnegie-icon-clip">
      <rect width="512" height="512" rx="128"/>
    </clipPath>
  </defs>
  <g clip-path="url(#carnegie-icon-clip)" shape-rendering="crispEdges">
    <rect width="512" height="512" fill="#1B3A5C"/>
    <!-- Spines, gold → blue → red → gray. Each bar is 50px wide with
         a 16px gap. Stack starts at x=141 to center 230px in 512. -->
    <rect x="141" y="111" width="50" height="290" fill="#C4A35A" rx="6"/>
    <rect x="207" y="131" width="50" height="250" fill="#5B8DB8" rx="6"/>
    <rect x="273" y="151" width="50" height="210" fill="#B83232" rx="6"/>
    <rect x="339" y="171" width="50" height="170" fill="#8A8A84" rx="6"/>
  </g>
</svg>
